<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneuriat Vert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: #e5e7eb;
    background: linear-gradient(135deg, #0f172a, #020617);
    position: relative;
}

/* TEXTURE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
}

/* CONTENT ABOVE */
.contact-bar,
.container,
.objectif-box {
    position: relative;
    z-index: 1;
}

/* CONTACT BAR */
.contact-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16px;
    padding: 12px;
    background: rgba(17,24,39,0.85);
    backdrop-filter: blur(10px);
}

/* CONTACT GROUP */
.contact-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

/* CONTACT CARD (GLASS) */
.contact-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: #e5e7eb;
    font-size: 0.85rem;
    transition: 0.2s;
}

.contact-card:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.10);
}

/* ICONES */
.fa-facebook { color: #1877F2; }
.fa-whatsapp { color: #25D366; }
.fa-envelope { color: #ef4444; }
.fa-phone { color: #22c55e; }

/* NUMERO */
.contact-extra {
    font-size: 0.8rem;
    color: #cbd5e1;
}

/* 🌟 TITRE GLOW */
.main-text {
    font-size: 1.15rem;
    font-weight: bold;
    text-align: center;

    background: linear-gradient(90deg, #22c55e, #4ade80, #86efac);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow: 0 0 6px rgba(34,197,94,0.35);

    animation: glowPulse 3s infinite alternate;
    margin-bottom: 6px;
}

/* ANIMATION GLOW */
@keyframes glowPulse {
    from {
        text-shadow: 0 0 4px rgba(34,197,94,0.25);
    }
    to {
        text-shadow: 0 0 10px rgba(34,197,94,0.55);
    }
}

/* OBJECTIF */
.objectif-box {
    text-align: center;
    padding: 14px 10px;
}

.objectif-title {
    font-size: 0.9rem;
    color: #cbd5e1;
}

/* FORM */
.container {
    flex: 1;
    padding: 10px;
    display: flex;
}

.card {
    flex: 1;
    min-height: 75vh;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(17,24,39,0.6);
    border: 1px solid rgba(255,255,255,0.05);
}

/* IFRAME */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
@media (max-width: 600px) {
    .main-text {
        font-size: 1rem;
    }
}
</style>
</head>

<body>

<!-- CONTACT -->
<div class="contact-bar">

    <div class="contact-group">
        <a class="contact-card" href="https://www.facebook.com/100038120421953" target="_blank">
            <i class="fab fa-facebook"></i> Facebook
        </a>

        <div class="contact-extra">
            <i class="fas fa-phone"></i>
            <a href="tel:+261340365611" style="color:#cbd5e1; text-decoration:none;">
                +261 34 03 656 11
            </a>
        </div>
    </div>

    <a class="contact-card" href="https://wa.me/261340365611" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a class="contact-card" href="mailto:dreddvakinankaratra@environnement.mg">
        <i class="fas fa-envelope"></i> Email
    </a>

</div>

<!-- TEXTE + OBJECTIF -->
<div class="objectif-box">

    <div class="main-text">
        🌱 Identification des acteurs de l'entrepreneuriat vert
    </div>

    <div class="objectif-title">
        Objectif / Tanjona
    </div>

</div>

<!-- FORM -->
<div class="container">
    <div class="card">
        <iframe 
            src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1"
            loading="lazy">
        </iframe>
    </div>
</div>

</body>
      </html>
