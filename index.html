<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recensement Entrepreneuriat Vert</title>
    <style>
        /* On fixe la hauteur de la page pour éviter les débordements */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000000 !important;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* Organise l'en-tête et le formulaire l'un sur l'autre */
            overflow: hidden;
        }

        /* L'en-tête garde sa taille fixe */
        .en-tete {
            background-color: #0d47a1;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            flex-shrink: 0; /* Empêche l'en-tête de s'écraser */
        }

        /* Le formulaire prend TOUT le reste de la place disponible */
        .container {
            flex-grow: 1;
            width: 100%;
            position: relative;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%; /* Il remplit exactement son conteneur */
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="en-tete">
        Identification des acteurs de l'entrepreneuriat vert
    </div>

    <div class="container">
        <iframe src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1" 
                title="Formulaire"></iframe>
    </div>

</body>
</html>
