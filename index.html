<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREDD Vakinankaratra</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .hero { background: #000; height: 35vh; position: relative; overflow: hidden; }
        #bg-video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 100%; min-height: 100%; object-fit: cover; opacity: 0.6; }
        .container { max-width: 450px; margin: -20px auto 40px; padding: 10px; position: relative; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        video { width: 100%; border-radius: 8px; }
        .logo-img { position: relative; z-index: 10; width: 80px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <img src="logo.png" class="logo-img">
        <h1 style="color:white; font-size: 1.2rem; position: relative; z-index: 10;">Identification des acteurs</h1>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="color:#7c0e73; font-size: 1rem;">Enregistrement</h2>
            <iframe src="https://tally.so/embed/XXXXXX?hideTitle=1" width="100%" height="500" frameborder="0"></iframe>
        </div>

        <div class="card">
            <h2 style="color:#7c0e73; font-size: 1rem;">Notre Mission</h2>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Acteurs de l'entrepreneuriat vert. Pour un développement durable.</p>
            <video controls>
                <source src="mission.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>
</body>
</html>
