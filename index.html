<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREDD Vakinankaratra - Entrepreneuriat Vert</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; overflow-x: hidden; }

        /* Section Vidéo Couverture */
        .hero { 
            position: relative; height: 35vh; width: 100%; 
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; text-align: center; background: #000;
        }
        video#bg-video { 
            position: absolute; top: 50%; left: 50%; 
            min-width: 100%; min-height: 100%; 
            z-index: 0; transform: translate(-50%, -50%); 
            filter: brightness(0.6); object-fit: cover;
        }
        
        /* Conteneur principal */
        .container { max-width: 500px; margin: -25px auto 50px; position: relative; z-index: 10; padding: 0 15px; }

        /* Cartes de contenu en NOIR */
        .card { 
            background: #000; 
            border-radius: 12px; 
            padding: 18px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
            border: 1px solid #333; /* Bordure discrète */
        }
        
        h2 { font-size: 1rem; color: #4caf50; border-left: 3px solid #0d47a1; padding-left: 8px; margin-bottom: 15px; text-transform: uppercase; margin-top: 0; }

        /* Barre de contact */
        .contact-links { display: flex; flex-direction: column; gap: 10px; }
        .contact-links a { text-decoration: none; color: #fff; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .fa-facebook { color: #1877F2; font-size: 1.1rem; }
        .fa-whatsapp { color: #25D366; font-size: 1.1rem; }
        .fa-envelope { color: #ea4335; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        
        <div class="card">
            <h2>Enregistrement de l'acteur</h2>
            <iframe src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                    width="100%" height="650" frameborder="0" marginheight="0" marginwidth="0" title="Formulaire DREDD"></iframe>
        </div>

        <div class="card">
            <h2>Contacts DREDD</h2>
            <div class="contact-links">
                <a href="https://www.facebook.com/100038120421953" target="_blank">
                    <i class="fab fa-facebook"></i> Facebook DREDD Vakinankaratra
                </a>
                <a href="whatsapp://send?phone=261344740615">
                    <i class="fab fa-whatsapp"></i> +261 34 47 406 15
                </a>
                <a href="mailto:dreddvakinankaratra@environnement.mg">
                    <i class="fas fa-envelope"></i> dreddvakinankaratra@environnement.mg
                </a>
            </div>
        </div>

    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
