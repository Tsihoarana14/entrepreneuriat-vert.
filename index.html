<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREDD Vakinankaratra - Entrepreneuriat Vert</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #333; overflow-x: hidden; }

        /* Section Vidéo Couverture (Éoliennes / Homme en herbe) */
        .hero { 
            position: relative; height: 40vh; width: 100%; 
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; text-align: center; background: #000;
        }
        video#bg-video { 
            position: absolute; top: 50%; left: 50%; 
            min-width: 100%; min-height: 100%; 
            z-index: 0; transform: translate(-50%, -50%); 
            filter: brightness(0.5); object-fit: cover;
        }
        .hero-content { z-index: 2; color: white; padding: 20px; }
        .logo { width: 90px; margin-bottom: 10px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        
        /* Conteneur principal */
        .container { max-width: 500px; margin: -30px auto 50px; position: relative; z-index: 10; padding: 0 15px; }

        /* Cartes de contenu */
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; color: #0d47a1; border-left: 4px solid #4caf50; padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; }

        /* Barre de contact style DREDD */
        .contact-links { display: flex; flex-direction: column; gap: 12px; }
        .contact-links a { text-decoration: none; color: #333; font-size: 0.9rem; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .fa-facebook { color: #1877F2; font-size: 1.3rem; }
        .fa-whatsapp { color: #25D366; font-size: 1.3rem; }
        .fa-envelope { color: #ea4335; font-size: 1.3rem; }

        /* Vidéo de mission en bas */
        .video-mission { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
        .video-caption { font-size: 0.85rem; color: #666; font-style: italic; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="hero">
        <video autoplay muted loop playsinline webkit-playsinline id="bg-video">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <img src="logo.png" alt="Logo DREDD" class="logo">
            <h1 style="font-size: 1.4rem; margin: 0;">Identification des acteurs</h1>
            <p style="color: #4ade80; font-weight: bold; margin: 5px 0 0;">DREDD VAKINANKARATRA</p>
        </div>
    </div>

    <div class="container">
        
        <div class="card">
            <h2>Enregistrement de l'acteur</h2>
            <iframe src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                    width="100%" height="600" frameborder="0" marginheight="0" marginwidth="0" title="Formulaire DREDD"></iframe>
        </div>

        <div class="card">
            <h2>Contacts DREDD</h2>
            <div class="contact-links">
                <a href="https://www.facebook.com/100038120421953" target="_blank">
                    <i class="fab fa-facebook"></i> Facebook DREDD Vakinankaratra
                </a>
                <a href="whatsapp://send?phone=261344740615">
                    <i class="fab fa-whatsapp"></i> +261 34 47 406 15
                </a>
                <a href="mailto:dreddvakinankaratra@environnement.mg">
                    <i class="fas fa-envelope"></i> dreddvakinankaratra@environnement.mg
                </a>
            </div>
        </div>

        <div class="card">
            <h2>Aperçu de nos missions</h2>
            <video controls class="video-mission">
                <source src="mission.mp4" type="video/mp4">
            </video>
            <p class="video-caption">Acteurs de l'entrepreneuriat vert. Pour un développement durable.</p>
        </div>

    </div>

    <script async src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
