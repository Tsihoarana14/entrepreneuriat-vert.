<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneuriat Vert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary: #1e3a8a;
    --dark: #0f172a;
    --card: #111827;
    --text: #e5e7eb;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, var(--primary), #2563eb);
    padding: 14px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: bold;
}

/* CONTACT BAR (plus compacte) */
.contact-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px;
    background: rgba(17,24,39,0.85);
    backdrop-filter: blur(10px);
}

/* liens plus petits */
.contact-card {
    background: var(--card);
    padding: 6px 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text);
    font-size: 0.85rem;
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.2s;
}

.contact-card:hover {
    transform: translateY(-2px);
    background: #1f2937;
}

/* icônes plus petites */
.contact-card i {
    font-size: 1rem;
}

.fa-facebook { color: #1877F2; }
.fa-whatsapp { color: #25D366; }
.fa-envelope { color: #ef4444; }

/* FORM */
.container {
    flex: 1;
    padding: 10px;
    display: flex;
}

.card {
    flex: 1;
    min-height: 75vh;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(17,24,39,0.6);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* MOBILE */
@media (max-width: 600px) {
    .header {
        font-size: 1rem;
    }

    .contact-card {
        font-size: 0.75rem;
        padding: 5px 8px;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    🌱 Identification des acteurs de l'entrepreneuriat vert
</div>

<!-- CONTACT -->
<div class="contact-bar">

    <a class="contact-card" href="https://www.facebook.com/100038120421953" target="_blank">
        <i class="fab fa-facebook"></i> Facebook
    </a>

    <a class="contact-card" href="https://wa.me/261344740615" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a class="contact-card" href="mailto:dreddvakinankaratra@environnement.mg">
        <i class="fas fa-envelope"></i> Email
    </a>

</div>

<!-- FORM -->
<div class="container">
    <div class="card">
        <iframe 
            src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1"
            loading="lazy">
        </iframe>
    </div>
</div>

</body>
</html>
