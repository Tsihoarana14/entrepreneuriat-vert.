<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrepreneuriat Vert</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --primary: #1e3a8a;
    --dark: #0f172a;
    --card: #111827;
    --text: #e5e7eb;
    --green: #10b981;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, var(--primary), #2563eb);
    padding: 18px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* CONTACT */
.contact-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    padding: 15px;
    background: rgba(17,24,39,0.85);
    backdrop-filter: blur(10px);
}

.contact-card {
    background: var(--card);
    padding: 10px 15px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--text);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
}

.contact-card:hover {
    transform: translateY(-3px);
    background: #1f2937;
}

.fa-facebook { color: #1877F2; }
.fa-whatsapp { color: #25D366; }
.fa-envelope { color: #ef4444; }

/* LABEL */
.label {
    text-align: center;
    padding: 10px;
    font-size: 0.9rem;
    color: #9ca3af;
}

/* FORM */
.container {
    flex: 1;
    padding: 15px;
}

.card {
    height: 100%;
    border-radius: 18px;
    overflow: hidden;
    background: rgba(17,24,39,0.6);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .header {
        font-size: 1rem;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    🌱 Identification des acteurs de l'entrepreneuriat vert
</div>

<!-- CONTACT -->
<div class="contact-bar">

    <a class="contact-card" href="https://www.facebook.com/100038120421953" target="_blank">
        <i class="fab fa-facebook"></i> Facebook
    </a>

    <a class="contact-card" href="https://wa.me/261344740615" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <a class="contact-card" href="mailto:dreddvakinankaratra@environnement.mg">
        <i class="fas fa-envelope"></i> Email
    </a>

</div>

<!-- TEXTE -->
<div class="label">
    Remplissez le formulaire ci-dessous
</div>

<!-- FORMULAIRE -->
<div class="container">
    <div class="card">
        <iframe 
            src="https://tally.so/embed/vGOobd?hideTitle=1&transparentBackground=1">
        </iframe>
    </div>
</div>

</body>
  </html>
